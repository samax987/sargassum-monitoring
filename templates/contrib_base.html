<!DOCTYPE html>
<html lang="{{ t.html_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>{% block title %}{{ t.nav_report }}{% endblock %} · Sargasses Saint-Barth</title>
  <style>
    :root {
      --bg: #0b1620;
      --panel: #11212e;
      --panel-2: #162c3c;
      --line: #1e3a4d;
      --text: #e7eef3;
      --muted: #93a7b4;
      --accent: #2dd4bf;
      --accent-2: #14b8a6;
      --danger: #ef4444;
      --ok: #22c55e;
      --warn: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header.topbar {
      display: flex; flex-wrap: wrap; align-items: center; gap: 10px 16px;
      padding: 14px 18px; background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    .topbar .brand { font-weight: 700; font-size: 1.05rem; }
    .topbar .brand small { color: var(--muted); font-weight: 400; }
    .topbar .spacer { flex: 1; }
    .topbar nav { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
    .topbar nav .who { color: var(--muted); font-size: .9rem; }
    .langsw { font-size: .85rem; letter-spacing: .03em; }
    .langsw a { color: var(--muted); }
    .langsw a.cur { color: var(--text); font-weight: 700; text-decoration: underline; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 22px 18px 48px; }
    h1 { font-size: 1.5rem; margin: .2em 0 .4em; }
    h2 { font-size: 1.15rem; margin: 1.2em 0 .5em; }
    p.lead { color: var(--muted); }
    .card {
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 14px; padding: 20px; margin: 16px 0;
    }
    label { display: block; margin: 14px 0 6px; font-weight: 600; }
    label .opt { color: var(--muted); font-weight: 400; font-size: .85rem; }
    input[type=text], input[type=password], input[type=number],
    input[type=datetime-local], input[type=file], select, textarea {
      width: 100%; padding: 12px 14px; font-size: 1rem;
      background: var(--panel-2); color: var(--text);
      border: 1px solid var(--line); border-radius: 10px;
    }
    input[type=file] { padding: 9px 12px; }
    input[type=file]::file-selector-button {
      margin-right: 10px; padding: 6px 12px; border: none; border-radius: 8px;
      background: var(--accent-2); color: #04221d; font-weight: 700; cursor: pointer;
    }
    textarea { min-height: 90px; resize: vertical; }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--accent); }
    .btn {
      display: inline-block; cursor: pointer; font-size: 1rem; font-weight: 700;
      padding: 12px 20px; border-radius: 10px; border: 1px solid transparent;
      background: var(--accent-2); color: #04221d;
    }
    .btn:hover { background: var(--accent); text-decoration: none; }
    .btn.block { width: 100%; text-align: center; }
    .btn.ghost { background: transparent; border-color: var(--line); color: var(--text); }
    .btn.ghost:hover { background: var(--panel-2); }
    .btn-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 18px; }
    .alert { padding: 12px 14px; border-radius: 10px; margin: 12px 0; font-size: .95rem; }
    .alert.error { background: #3a1518; border: 1px solid #7f1d1d; color: #fecaca; }
    .alert.ok { background: #0f2e1c; border: 1px solid #166534; color: #bbf7d0; }
    .alert.info { background: #0f2536; border: 1px solid #1e4e6b; color: #bae6fd; }
    .risk-list { display: grid; gap: 8px; margin-top: 6px; }
    .risk-opt {
      display: flex; align-items: center; gap: 10px; padding: 12px 14px;
      background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px;
      cursor: pointer;
    }
    .risk-opt input { width: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .92rem; }
    th, td { text-align: left; padding: 9px 8px; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-weight: 600; }
    .badge { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: .8rem; font-weight: 600; }
    .badge.pending { background: #3a2c0c; color: #fde68a; }
    .badge.approved { background: #0f2e1c; color: #bbf7d0; }
    .badge.rejected { background: #3a1518; color: #fecaca; }
    /* Honeypot anti-bot : invisible pour un humain, rempli par les robots */
    .hp { position: absolute; left: -9999px; width: 1px; height: 1px; overflow: hidden; }
    footer.foot { color: var(--muted); font-size: .82rem; text-align: center; padding: 24px 18px; }
    .inline-form { display: inline; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">🌊 Sargasses SBH</div>
    <div class="spacer"></div>
    <nav>
      <a href="{{ url_for('index') }}">{{ t.nav_map }}</a>
      {% if contributor is defined and contributor %}
        <span class="who">👋 {{ contributor.display_name }}</span>
        <a href="{{ url_for('contrib.observer') }}">{{ t.nav_report }}</a>
        <a href="{{ url_for('contrib.my_observations') }}">{{ t.nav_my }}</a>
        <form class="inline-form" method="post" action="{{ url_for('contrib.logout') }}">
          <input type="hidden" name="_csrf" value="{{ csrf_token }}">
          <button class="btn ghost" type="submit">{{ t.nav_logout }}</button>
        </form>
      {% else %}
        <a href="{{ url_for('contrib.login') }}">{{ t.nav_login }}</a>
        <a href="{{ url_for('contrib.register') }}">{{ t.nav_register }}</a>
      {% endif %}
      <span class="langsw">
        <a href="{{ request.path }}?lang=fr"{% if lang == 'fr' %} class="cur"{% endif %}>FR</a>
        ·
        <a href="{{ request.path }}?lang=en"{% if lang == 'en' %} class="cur"{% endif %}>EN</a>
      </span>
    </nav>
  </header>

  <main class="wrap">
    {% block content %}{% endblock %}
  </main>

  <footer class="foot">
    {{ t.footer_1 }}<br>
    {{ t.footer_2 }}
  </footer>
</body>
</html>
